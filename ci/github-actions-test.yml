name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build corpus FTS index
        run: |
          python scripts/build_corpus.py

      - name: Run tests
        env:
          # Make sure no real API key is available during CI — every paid
          # call should be mocked in the test layer.
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
        run: |
          python -m pytest -q --tb=short
